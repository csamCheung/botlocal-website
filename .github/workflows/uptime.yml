name: uptime

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: admin app (botlocal-production)
        run: curl -sf -o /dev/null --max-time 30 --retry 2 https://botlocal-production.up.railway.app/login
      - name: engine (rag-chatbot-production)
        run: curl -sf -o /dev/null --max-time 30 --retry 2 https://rag-chatbot-production-5fcc.up.railway.app/
